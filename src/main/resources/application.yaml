spring:
  application:
    name: security
  datasource:
    url: ${SCRT_DB_URL}
    username: ${SCRT_USERNAME}
    password: ${SCRT_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081